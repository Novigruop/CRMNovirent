<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Novigroup CRM</title>

<style>
body{
background:#0a0a0a;
color:white;
font-family:Arial;
margin:0;
}

header{
text-align:center;
padding:20px;
font-size:32px;
color:#C9A84C;
}

.btn{
background:#C9A84C;
color:black;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

td,th{
padding:10px;
border-bottom:1px solid #222;
}

/* MODAL */
.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
display:none;
justify-content:center;
align-items:center;
}

.modal.active{display:flex;}

.modal-box{
background:#111;
padding:25px;
border-radius:12px;
width:700px;
max-height:90vh;
overflow:auto;
}

.modal-header{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

.close{
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

label{
font-size:12px;
color:#C9A84C;
}

input,select,textarea{
background:#1a1a1a;
border:1px solid #333;
padding:8px;
color:white;
border-radius:6px;
}

textarea{
grid-column:span 2;
height:100px;
}

.save{
margin-top:15px;
width:100%;
}
</style>
</head>

<body>

<header>NOVIGROUP CRM</header>

<div style="padding:20px">
<button class="btn" onclick="abrirModal()">+ NUEVA PROPIEDAD</button>

<table id="tabla"></table>
</div>

<!-- MODAL -->
<div id="modal" class="modal">

<div class="modal-box" onclick="event.stopPropagation()">

<div class="modal-header">
<h2>Nueva Propiedad</h2>
<span class="close" onclick="cerrarModal()">✕</span>
</div>

<div class="grid">

<label>Título</label>
<input id="titulo">

<label>Tipo Negocio</label>
<select id="negocio">
<option>VENTA</option>
<option>RENTA</option>
</select>

<label>Tipo Inmueble</label>
<select id="tipo">
<option>CASA</option>
<option>APARTAMENTO</option>
<option>LOTE</option>
</select>

<label>Estado</label>
<select id="estado">
<option>DISPONIBLE</option>
<option>VENDIDO</option>
</select>

<label>Ciudad</label>
<input id="ciudad">

<label>Localidad</label>
<input id="localidad">

<label>Precio</label>
<input id="precio">

<label>Área</label>
<input id="area">

<label>Alcobas</label>
<input id="alcobas">

<label>Baños</label>
<input id="banos">

<label>País</label>
<input id="pais" value="Colombia">

<label>Departamento</label>
<input id="departamento">

<label>Garaje</label>
<input id="garaje">

<label>Estrato</label>
<input id="estrato">

<label>Pisos</label>
<input id="pisos">

<label>Año</label>
<input id="ano">

<label>Admin</label>
<input id="admin">

<label>Internas</label>
<input id="internas">

<label>Externas</label>
<input id="externas">

<label>Destacado</label>
<select id="destacado">
<option>SI</option>
<option>NO</option>
</select>

<label>Descripción</label>
<textarea id="descripcion"></textarea>

</div>

<button class="btn save" onclick="guardar()">GUARDAR PROPIEDAD</button>

</div>
</div>

<script>

const API = "TU_URL_DE_APPS_SCRIPT_AQUI";

// abrir / cerrar
function abrirModal(){
document.getElementById("modal").classList.add("active");
}

function cerrarModal(){
document.getElementById("modal").classList.remove("active");
}

// cerrar al hacer click afuera
document.getElementById("modal").addEventListener("click",cerrarModal);

// guardar
async function guardar(){

await fetch(API,{
method:"POST",
body:JSON.stringify({
action:"crear_propiedad",
titulo:titulo.value,
ciudad:ciudad.value,
localidad:localidad.value,
tipo:tipo.value,
negocio:negocio.value,
alcobas:alcobas.value,
banos:banos.value,
pais:pais.value,
departamento:departamento.value,
estado:estado.value,
garaje:garaje.value,
estrato:estrato.value,
pisos:pisos.value,
ano:ano.value,
admin:admin.value,
internas:internas.value,
externas:externas.value,
destacado:destacado.value,
precio:precio.value,
area:area.value
})
})

cerrarModal();
load();
}

// cargar tabla
async function load(){
const r = await fetch(API+"?action=read_propiedades");
const j = await r.json();

tabla.innerHTML = j.data.map(x=>`
<tr>
<td>${x.TITULO}</td>
<td>${x.CIUDAD}</td>
<td>$ ${x.PRECIO}</td>
<td>${x.ESTADO}</td>
</tr>
`).join("");
}

load();

</script>

</body>
</html>
