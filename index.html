<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Novigroup CRM</title>

<style>
body{background:#0a0a0a;color:#ddd;font-family:Arial;margin:0}
header{text-align:center;padding:28px;color:#C9A84C;font-size:32px}

.tabs{display:flex;justify-content:center;gap:30px;border-bottom:1px solid #222}
.tabs button{background:none;border:none;color:#aaa;padding:14px;cursor:pointer}
.tabs button.active{color:#C9A84C;border-bottom:2px solid #C9A84C}

.container{padding:20px}

.btn{background:#C9A84C;color:black;padding:8px 12px;border:none;border-radius:6px;cursor:pointer}
.btn-danger{background:#c94c4c;color:white}

table{width:100%;border-collapse:collapse;margin-top:20px}
th,td{padding:10px;border-bottom:1px solid #222}

.modal{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.85);
display:none;justify-content:center;align-items:center
}
.modal.active{display:flex}

.box{
background:#111;padding:20px;border-radius:10px;
width:600px
}

input,select{
width:100%;
margin-bottom:10px;
padding:8px;
background:#1a1a1a;border:1px solid #333;color:white
}
</style>
</head>

<body>

<header>NOVIGROUP</header>

<div class="tabs">
<button onclick="tab('propiedades',this)" class="active">PROPIEDADES</button>
<button onclick="tab('proyectos',this)">PROYECTOS</button>
<button onclick="tab('clientes',this)">CLIENTES</button>
<button onclick="tab('tareas',this)">TAREAS</button>
</div>

<div class="container">

<button class="btn" onclick="abrirModal()">+ NUEVO</button>

<table>
<thead>
<tr>
<th>ID</th>
<th>TÍTULO</th>
<th>CIUDAD</th>
<th>PRECIO</th>
<th>ACCIONES</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="box" onclick="event.stopPropagation()">

<h3 id="tituloModal"></h3>

<input id="titulo" placeholder="Título">
<input id="ciudad" placeholder="Ciudad">
<input id="precio" placeholder="Precio">

<button class="btn" onclick="guardar()">GUARDAR</button>

</div>
</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbwWFcQ1nlVsLyiEOFMvSbYAxPHdAqSvKP1qMCvp1BrQkhb6ctod8oSShrj1cBKWzSc/exec";

let modulo = "propiedades";
let editID = null;

// CAMBIAR TAB
function tab(m,b){
modulo = m;
document.querySelectorAll(".tabs button").forEach(x=>x.classList.remove("active"));
b.classList.add("active");
cargar();
}

// ABRIR MODAL NUEVO
function abrirModal(){
editID = null;
titulo.value="";
ciudad.value="";
precio.value="";
tituloModal.innerText="Nuevo registro";
modal.classList.add("active");
}

// EDITAR
function editar(p){
editID = p.ID;
titulo.value = p.TITULO;
ciudad.value = p.CIUDAD;
precio.value = p.PRECIO;
tituloModal.innerText="Editar registro";
modal.classList.add("active");
}

// ELIMINAR
async function eliminar(id){
if(!confirm("¿Eliminar este registro?")) return;

await fetch(API,{
method:"POST",
body:JSON.stringify({
action:"eliminar_"+modulo,
id:id
})
});

cargar();
}

// GUARDAR
async function guardar(){

let data = {
action: editID ? "editar_"+modulo : "crear_"+modulo,
id: editID,
titulo: titulo.value,
ciudad: ciudad.value,
precio: precio.value
};

await fetch(API,{
method:"POST",
body:JSON.stringify(data)
});

modal.classList.remove("active");
cargar();
}

// CARGAR
async function cargar(){

const r = await fetch(API+"?action=read_"+modulo);
const j = await r.json();

if(!j.data){
tabla.innerHTML = "<tr><td colspan='5'>Sin datos</td></tr>";
return;
}

tabla.innerHTML = j.data.map(p=>`
<tr>
<td>${p.ID}</td>
<td>${p.TITULO||p.NOMBRE}</td>
<td>${p.CIUDAD||""}</td>
<td>${p.PRECIO||""}</td>
<td>
<button class="btn" onclick='editar(${JSON.stringify(p)})'>Editar</button>
<button class="btn btn-danger" onclick="eliminar('${p.ID}')">Eliminar</button>
</td>
</tr>
`).join("");

}

modal.addEventListener("click",()=>modal.classList.remove("active"));

cargar();

</script>

</body>
</html>
