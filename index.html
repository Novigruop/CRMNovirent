<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Novigroup CRM</title>

<style>
body{background:#0a0a0a;color:white;font-family:Arial;margin:0}

header{
text-align:center;
padding:30px;
color:#C9A84C;
font-size:34px;
}

.tabs{
display:flex;
justify-content:center;
gap:30px;
border-bottom:1px solid #222;
}

.tabs button{
background:none;
border:none;
color:#aaa;
padding:15px;
cursor:pointer;
}

.tabs button.active{
color:#C9A84C;
border-bottom:2px solid #C9A84C;
}

.container{padding:20px}

.btn{
background:#C9A84C;
color:black;
padding:10px;
border:none;
border-radius:6px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:12px;
border-bottom:1px solid #222;
}

/* MODAL */
.modal{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.85);
display:none;
justify-content:center;
align-items:center;
}

.modal.active{display:flex}

.box{
background:#111;
padding:20px;
border-radius:12px;
width:600px;
max-height:90vh;
overflow:auto;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

input,select,textarea{
background:#1a1a1a;
border:1px solid #333;
color:white;
padding:8px;
border-radius:6px;
}

textarea{grid-column:span 2}

</style>
</head>

<body>

<header>NOVIGROUP</header>

<div class="tabs">
<button onclick="tab('tareas',this)" class="active">TAREAS</button>
<button onclick="tab('propiedades',this)">PROPIEDADES</button>
<button onclick="tab('proyectos',this)">PROYECTOS</button>
<button onclick="tab('clientes',this)">CLIENTES</button>
</div>

<div class="container">

<button class="btn" onclick="abrirModal()">+ NUEVO</button>

<table id="tabla">
<thead>
<tr>
<th>ID</th>
<th>TITULO</th>
<th>CIUDAD</th>
<th>PRECIO</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="box" onclick="event.stopPropagation()">

<h3 id="tituloModal"></h3>

<div id="formulario" class="grid"></div>

<br>
<button class="btn" onclick="guardar()">GUARDAR</button>

</div>
</div>

<script>

const API = "PEGA_AQUI_TU_URL_APPS_SCRIPT";
let moduloActual = "tareas";

// CAMBIAR TAB
function tab(m,b){
moduloActual = m;

document.querySelectorAll(".tabs button").forEach(x=>x.classList.remove("active"));
b.classList.add("active");

cargar();
}

// ABRIR MODAL DINÁMICO
function abrirModal(){

document.getElementById("modal").classList.add("active");

const form = document.getElementById("formulario");

if(moduloActual === "propiedades"){
document.getElementById("tituloModal").innerText="Nueva Propiedad";

form.innerHTML = `
<input id="titulo" placeholder="Título">
<input id="ciudad" placeholder="Ciudad">
<input id="localidad" placeholder="Localidad">
<input id="precio" placeholder="Precio">
<input id="area" placeholder="Área">
<input id="alcobas" placeholder="Alcobas">
<input id="banos" placeholder="Baños">
<input id="tipo" placeholder="Tipo">
<input id="negocio" placeholder="Negocio">
<input id="estado" placeholder="Estado">
<textarea id="descripcion" placeholder="Descripción"></textarea>
`;
}

if(moduloActual === "clientes"){
document.getElementById("tituloModal").innerText="Nuevo Cliente";

form.innerHTML = `
<input id="nombre" placeholder="Nombre">
<input id="cedula" placeholder="Cédula">
<input id="telefono" placeholder="Teléfono">
<input id="correo" placeholder="Correo">
<input id="direccion" placeholder="Dirección">
<input id="presupuesto" placeholder="Presupuesto">
<textarea id="notas" placeholder="Notas"></textarea>
`;
}

if(moduloActual === "tareas"){
document.getElementById("tituloModal").innerText="Nueva Tarea";

form.innerHTML = `
<input id="cliente" placeholder="Cliente">
<input id="actividad" placeholder="Actividad">
<input id="responsable" placeholder="Responsable">
<input id="estado" placeholder="Estado">
<textarea id="notas" placeholder="Notas"></textarea>
`;
}

if(moduloActual === "proyectos"){
document.getElementById("tituloModal").innerText="Nuevo Proyecto";

form.innerHTML = `
<input id="titulo" placeholder="Título">
<input id="ciudad" placeholder="Ciudad">
<input id="precio" placeholder="Precio">
<textarea id="descripcion" placeholder="Descripción"></textarea>
`;
}

}

// CERRAR
document.getElementById("modal").addEventListener("click",()=>{
document.getElementById("modal").classList.remove("active");
});

// GUARDAR
async function guardar(){

let data = { action:"crear_"+moduloActual };

if(moduloActual === "propiedades"){
Object.assign(data,{
titulo:titulo.value,
ciudad:ciudad.value,
localidad:localidad.value,
precio:precio.value,
area:area.value,
alcobas:alcobas.value,
banos:banos.value,
tipo:tipo.value,
negocio:negocio.value,
estado:estado.value
});
}

if(moduloActual === "clientes"){
Object.assign(data,{
nombre:nombre.value,
cedula:cedula.value,
telefono:telefono.value,
correo:correo.value,
direccion:direccion.value,
presupuesto:presupuesto.value,
notas:notas.value
});
}

if(moduloActual === "tareas"){
Object.assign(data,{
cliente:cliente.value,
actividad:actividad.value,
responsable:responsable.value,
estado:estado.value,
notas:notas.value
});
}

if(moduloActual === "proyectos"){
Object.assign(data,{
titulo:titulo.value,
ciudad:ciudad.value,
precio:precio.value,
descripcion:descripcion.value
});
}

await fetch(API,{
method:"POST",
body:JSON.stringify(data)
});

document.getElementById("modal").classList.remove("active");

cargar();
}

// CARGAR DATOS
async function cargar(){

const r = await fetch(API+"?action=read_"+moduloActual);
const j = await r.json();

const tbody = document.querySelector("#tabla tbody");

if(!j.data || j.data.length===0){
tbody.innerHTML = "<tr><td colspan='4'>Sin datos</td></tr>";
return;
}

tbody.innerHTML = j.data.map(x=>`
<tr>
<td>${x.ID||""}</td>
<td>${x.TITULO||x.NOMBRE||""}</td>
<td>${x.CIUDAD||""}</td>
<td>${x.PRECIO||""}</td>
</tr>
`).join("");

}

// INIT
cargar();

</script>

</body>
</html>
