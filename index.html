<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Novigroup CRM</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0a0a0a;
  color:white;
}

header{
  text-align:center;
  padding:20px;
  font-size:28px;
  color:#C9A84C;
}

.tabs{
  display:flex;
  justify-content:center;
  gap:20px;
  border-bottom:1px solid #222;
}

.tabs button{
  background:none;
  border:none;
  color:#aaa;
  padding:10px;
  cursor:pointer;
}

.tabs button.active{
  color:#C9A84C;
  border-bottom:2px solid #C9A84C;
}

.container{
  padding:20px;
}

table{
  width:100%;
  border-collapse:collapse;
}

th, td{
  padding:10px;
  border-bottom:1px solid #222;
  text-align:left;
}
</style>
</head>

<body>

<header>NOVIGROUP CRM</header>

<div class="tabs">
  <button onclick="mostrarModulo('tareas', this)" class="active">TAREAS</button>
  <button onclick="mostrarModulo('propiedades', this)">PROPIEDADES</button>
  <button onclick="mostrarModulo('proyectos', this)">PROYECTOS 🔥</button>
  <button onclick="mostrarModulo('clientes', this)">CLIENTES</button>
</div>

<div class="container">
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>TITULO</th>
        <th>CIUDAD</th>
        <th>PRECIO</th>
      </tr>
    </thead>
    <tbody id="tabla"></tbody>
  </table>
</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbwWFcQ1nlVsLyiEOFMvSbYAxPHdAqSvKP1qMCvp1BrQkhb6ctod8oSShrj1cBKWzSc/exec";

// ===================== DATA =====================
let dataProyectos = [];

// ===================== NAVEGACIÓN =====================
function mostrarModulo(modulo, btn){

  document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");

  if(modulo === "propiedades") cargarPropiedades();
  if(modulo === "proyectos") cargarProyectos();
  if(modulo === "clientes") cargarClientes();
  if(modulo === "tareas") cargarTareas();
}

// ===================== PROPIEDADES =====================
async function cargarPropiedades(){
  const res = await fetch(API + "?action=read_propiedades");
  const json = await res.json();
  renderTabla(json.data);
}

// ===================== PROYECTOS 🔥 =====================
async function cargarProyectos(){
  const res = await fetch(API + "?action=read_proyectos");
  const json = await res.json();

  dataProyectos = json.data || [];
  renderTabla(dataProyectos);
}

// ===================== CLIENTES =====================
async function cargarClientes(){
  const res = await fetch(API + "?action=read_clientes");
  const json = await res.json();
  renderTabla(json.data);
}

// ===================== TAREAS =====================
async function cargarTareas(){
  const res = await fetch(API + "?action=read_tareas");
  const json = await res.json();
  renderTabla(json.data);
}

// ===================== RENDER =====================
function renderTabla(data){

  const tabla = document.getElementById("tabla");
  tabla.innerHTML = "";

  if(!data || data.length === 0){
    tabla.innerHTML = "<tr><td colspan='4'>Sin datos</td></tr>";
    return;
  }

  data.forEach(p => {
    tabla.innerHTML += `
      <tr>
        <td>${p.ID || "-"}</td>
        <td>${p.TITULO || p.NOMBRE || "-"}</td>
        <td>${p.CIUDAD || "-"}</td>
        <td>$ ${p.PRECIO ? Number(p.PRECIO).toLocaleString() : "-"}</td>
      </tr>
    `;
  });

}

// INIT
cargarTareas();

</script>

</body>
</html>
