<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Novigroup CRM</title>

<style>
body{background:#0a0a0a;color:#ddd;font-family:Arial;margin:0}

header{
text-align:center;
padding:25px;
color:#C9A84C;
font-size:30px;
}

.tabs{
display:flex;
justify-content:center;
gap:30px;
border-bottom:1px solid #222;
}
.tabs button{
background:none;
border:none;
color:#aaa;
padding:12px;
cursor:pointer;
}
.tabs button.active{
color:#C9A84C;
border-bottom:2px solid #C9A84C;
}

.container{
padding:20px;
max-width:1200px;
margin:auto;
}

.btn{
background:#C9A84C;
color:black;
padding:10px 14px;
border:none;
border-radius:6px;
cursor:pointer;
}

.table-box{
background:#111;
border-radius:10px;
border:1px solid #222;
overflow:hidden;
margin-top:20px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
color:#C9A84C;
padding:12px;
text-align:left;
font-size:12px;
}

td{
padding:12px;
border-top:1px solid #1f1f1f;
}

.modal{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.85);
display:none;
justify-content:center;
align-items:center;
}

.modal.active{display:flex;}

.box{
background:#111;
padding:20px;
border-radius:10px;
width:500px;
}

input{
width:100%;
margin-bottom:10px;
padding:8px;
background:#1a1a1a;
border:1px solid #333;
color:white;
}
</style>
</head>

<body>

<header>NOVIGROUP CRM</header>

<div class="tabs">
<button class="active" onclick="tab('propiedades',this)">PROPIEDADES</button>
<button onclick="tab('proyectos',this)">PROYECTOS</button>
<button onclick="tab('clientes',this)">CLIENTES</button>
<button onclick="tab('tareas',this)">TAREAS</button>
</div>

<div class="container">

<button class="btn" onclick="abrirModal()">+ NUEVO</button>

<div class="table-box">
<table>
<thead id="thead"></thead>
<tbody id="tabla"></tbody>
</table>
</div>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="box" onclick="event.stopPropagation()">

<h3 style="color:#C9A84C">Nuevo Registro</h3>

<input id="TITULO" placeholder="Título">
<input id="CIUDAD" placeholder="Ciudad">
<input id="NEGOCIO" placeholder="Negocio">
<input id="TIPO" placeholder="Tipo">
<input id="PRECIO" placeholder="Precio">
<input id="AREA" placeholder="Área">
<input id="ESTADO" placeholder="Estado">

<button class="btn" onclick="guardar()">GUARDAR</button>

</div>
</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbwWFcQ1nlVsLyiEOFMvSbYAxPHdAqSvKP1qMCvp1BrQkhb6ctod8oSShrj1cBKWzSc/exec";

let modulo = "propiedades";

// CAMBIO TAB
function tab(m,b){
modulo = m;
document.querySelectorAll(".tabs button").forEach(x=>x.classList.remove("active"));
b.classList.add("active");
cargar();
}

// MODAL
function abrirModal(){ modal.classList.add("active"); }
modal.addEventListener("click",()=>modal.classList.remove("active"));

// GUARDAR
async function guardar(){

let data = {
action: "create_"+modulo
};

document.querySelectorAll("#modal input").forEach(el=>{
data[el.id.toLowerCase()] = el.value;
});

await fetch(API,{
method:"POST",
body:JSON.stringify(data)
});

modal.classList.remove("active");
cargar();
}

// CARGAR
async function cargar(){

const r = await fetch(API+"?action=read_"+modulo);
const j = await r.json();

if(!j.data || j.data.length===0){
tabla.innerHTML = `<tr><td>Sin datos</td></tr>`;
return;
}

thead.innerHTML = `
<tr>
<th>ID</th>
<th>TÍTULO</th>
<th>NEGOCIO</th>
<th>TIPO</th>
<th>CIUDAD</th>
<th>PRECIO</th>
<th>ÁREA</th>
<th>ESTADO</th>
</tr>
`;

tabla.innerHTML = j.data.map(p=>`
<tr>
<td>${p.ID||""}</td>
<td>${p.TITULO||""}</td>
<td>${p.NEGOCIO||""}</td>
<td>${p.TIPO||""}</td>
<td>${p.CIUDAD||""}</td>
<td>$ ${Number(p.PRECIO||0).toLocaleString()}</td>
<td>${p.AREA||""}</td>
<td>${p.ESTADO||""}</td>
</tr>
`).join("");

}

cargar();

</script>

</body>
</html>
