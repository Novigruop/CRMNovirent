<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOVIGROUP CRM</title>

<style>
body{font-family:Arial;background:#0a0a0a;color:#fff;margin:0}
header{padding:15px;background:#111;color:#C9A84C;font-weight:bold}
.tabs{display:flex;background:#000;border-bottom:1px solid #333}
.tab-btn{flex:1;padding:12px;border:none;background:none;color:#aaa;cursor:pointer}
.tab-btn.active{color:#C9A84C;border-bottom:2px solid #C9A84C}
.container{padding:20px}
.table-wrap{overflow:auto}
table{width:100%;border-collapse:collapse}
th,td{padding:10px;border-bottom:1px solid #222}
.btn{background:#C9A84C;color:#000;padding:8px 15px;border:none;cursor:pointer}
</style>
</head>

<body>

<header>NOVIGROUP CRM</header>

<nav class="tabs">
  <button class="tab-btn active" onclick="verModulo('propiedades',this)">Propiedades</button>
  <button class="tab-btn" onclick="verModulo('proyectos',this)">Proyectos</button>
</nav>

<!-- PROPIEDADES -->
<div id="mod-propiedades" class="container module active">
  <button class="btn" onclick="cargarPropiedades()">Actualizar</button>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Título</th>
          <th>Ciudad</th>
          <th>Precio</th>
        </tr>
      </thead>
      <tbody id="tblPropiedades"></tbody>
    </table>
  </div>
</div>

<!-- PROYECTOS -->
<div id="mod-proyectos" class="container module">
  <button class="btn" onclick="cargarProyectos()">Actualizar</button>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Título</th>
          <th>Ciudad</th>
          <th>Precio</th>
        </tr>
      </thead>
      <tbody id="tblProyectos"></tbody>
    </table>
  </div>
</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbwWFcQ1nlVsLyiEOFMvSbYAxPHdAqSvKP1qMCvp1BrQkhb6ctod8oSShrj1cBKWzSc/exec";

let dProp = [];
let dProy = [];

// NAV
function verModulo(m, btn){
  document.querySelectorAll('.module').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(e=>e.classList.remove('active'));
  document.getElementById('mod-'+m).classList.add('active');
  btn.classList.add('active');
}

// ===================== PROPIEDADES =====================
async function cargarPropiedades(){
  const r = await fetch(API+"?action=read_propiedades");
  const j = await r.json();
  dProp = j.data || [];
  renderPropiedades();
}

function renderPropiedades(){
  const tb = document.getElementById('tblPropiedades');

  tb.innerHTML = dProp.map(i => `
    <tr>
      <td>${i.ID}</td>
      <td>${i.TITULO}</td>
      <td>${i.CIUDAD}</td>
      <td>$ ${Number(i.PRECIO).toLocaleString()}</td>
    </tr>
  `).join('');
}

// ===================== PROYECTOS =====================
async function cargarProyectos(){
  const r = await fetch(API+"?action=read_proyectos");
  const j = await r.json();
  dProy = j.data || [];
  renderProyectos();
}

function renderProyectos(){
  const tb = document.getElementById('tblProyectos');

  tb.innerHTML = dProy.map(i => `
    <tr>
      <td>${i.ID}</td>
      <td>${i.TITULO}</td>
      <td>${i.CIUDAD}</td>
      <td>$ ${Number(i.PRECIO).toLocaleString()}</td>
    </tr>
  `).join('');
}

// INIT
cargarPropiedades();

</script>

</body>
</html>
