<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Novigroup CRM</title>

<style>
body{background:#0a0a0a;color:white;font-family:Arial;margin:0}
header{text-align:center;padding:20px;color:#C9A84C;font-size:28px}

.tabs{display:flex;justify-content:center;gap:20px;border-bottom:1px solid #222}
.tabs button{background:none;border:none;color:#aaa;padding:12px;cursor:pointer}
.tabs button.active{color:#C9A84C;border-bottom:2px solid #C9A84C}

.module{display:none;padding:20px}
.module.active{display:block}

.btn{background:#C9A84C;color:black;border:none;padding:8px 12px;border-radius:6px;cursor:pointer;margin-bottom:10px}

table{width:100%;border-collapse:collapse}
td,th{padding:10px;border-bottom:1px solid #222}

.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:#000c;display:none;justify-content:center;align-items:center}
.modal.active{display:flex}

.box{background:#111;padding:20px;border-radius:10px;width:300px}
input,textarea{width:100%;margin:5px 0;padding:8px;background:#222;border:none;color:white}
</style>
</head>

<body>

<header>NOVIGROUP CRM</header>

<div class="tabs">
<button onclick="tab('tareas',this)" class="active">TAREAS</button>
<button onclick="tab('propiedades',this)">PROPIEDADES</button>
<button onclick="tab('proyectos',this)">PROYECTOS 🔥</button>
<button onclick="tab('clientes',this)">CLIENTES</button>
</div>

<div id="tareas" class="module active">
<button class="btn" onclick="modal('tarea')">+ Nueva</button>
<table id="tTareas"></table>
</div>

<div id="propiedades" class="module">
<button class="btn" onclick="modal('propiedad')">+ Nueva</button>
<table id="tProp"></table>
</div>

<div id="proyectos" class="module">
<button class="btn" onclick="modal('proyecto')">+ Nuevo</button>
<table id="tProy"></table>
</div>

<div id="clientes" class="module">
<button class="btn" onclick="modal('cliente')">+ Nuevo</button>
<table id="tCli"></table>
</div>

<div id="modal" class="modal">
<div class="box">
<h3 id="title"></h3>
<input id="f1" placeholder="Nombre / Título">
<input id="f2" placeholder="Ciudad">
<input id="f3" placeholder="Precio">
<textarea id="f4" placeholder="Descripción"></textarea>
<button class="btn" onclick="guardar()">Guardar</button>
</div>
</div>

<script>

const API = "/api/data";
let tipo="";

// tabs
function tab(t,b){
document.querySelectorAll(".module").forEach(m=>m.classList.remove("active"))
document.getElementById(t).classList.add("active")
document.querySelectorAll(".tabs button").forEach(x=>x.classList.remove("active"))
b.classList.add("active")

load(t)
}

// load data
async function load(t){
const r = await fetch(API+"?action=read_"+t)
const j = await r.json()

const id = {
tareas:"tTareas",
clientes:"tCli",
propiedades:"tProp",
proyectos:"tProy"
}[t]

document.getElementById(id).innerHTML = j.data.map(x=>`
<tr>
<td>${x.ID||""}</td>
<td>${x.TITULO||x.NOMBRE||""}</td>
<td>${x.CIUDAD||""}</td>
<td>${x.PRECIO||""}</td>
</tr>
`).join("")
}

// modal
function modal(t){
tipo=t
document.getElementById("modal").classList.add("active")
document.getElementById("title").innerText="Nuevo "+t
}

async function guardar(){

await fetch(API,{
method:"POST",
body:JSON.stringify({
action:"crear_"+tipo,
titulo:f1.value,
nombre:f1.value,
ciudad:f2.value,
precio:f3.value,
descripcion:f4.value
})
})

document.getElementById("modal").classList.remove("active")
load(tipo+"s")
}

// init
load("tareas")

</script>

</body>
</html>
