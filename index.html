<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Novigroup CRM</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0a0a0a;
  color:white;
}

/* HEADER */
header{
  text-align:center;
  padding:30px;
}

header h1{
  color:#C9A84C;
  font-size:40px;
}

header p{
  color:#aaa;
  font-size:12px;
  letter-spacing:2px;
}

/* TABS */
.tabs{
  display:flex;
  justify-content:center;
  gap:40px;
  border-bottom:1px solid #222;
}

.tabs button{
  background:none;
  border:none;
  color:#aaa;
  padding:15px;
  cursor:pointer;
}

.tabs button.active{
  color:#C9A84C;
  border-bottom:2px solid #C9A84C;
}

/* PANEL */
.panel{
  margin:20px;
  padding:15px;
  background:#111;
  border-radius:10px;
  display:flex;
  gap:15px;
  align-items:center;
}

.btn{
  background:#C9A84C;
  color:black;
  border:none;
  padding:10px 15px;
  border-radius:5px;
  cursor:pointer;
}

.select{
  background:#1a1a1a;
  border:1px solid #333;
  color:white;
  padding:8px;
  border-radius:5px;
}

/* TABLA */
.table-box{
  margin:20px;
  background:#111;
  border-radius:10px;
  overflow:hidden;
}

table{
  width:100%;
  border-collapse:collapse;
}

th{
  color:#C9A84C;
  font-size:12px;
  letter-spacing:1px;
  padding:15px;
}

td{
  padding:12px;
  border-top:1px solid #222;
}
</style>
</head>

<body>

<header>
  <h1>NOVIGROUP</h1>
  <p>GESTIÓN INMOBILIARIA</p>
</header>

<div class="tabs">
  <button onclick="mostrarModulo('tareas', this)" class="active">TAREAS</button>
  <button onclick="mostrarModulo('propiedades', this)">PROPIEDADES</button>
  <button onclick="mostrarModulo('proyectos', this)">PROYECTOS 🔥</button>
  <button onclick="mostrarModulo('clientes', this)">CLIENTES</button>
</div>

<div class="panel">
  <button class="btn">+ NUEVO</button>

  <span style="color:#C9A84C;">| FILTROS:</span>

  <select class="select">
    <option>Todos</option>
  </select>

  <select class="select">
    <option>Todos</option>
  </select>
</div>

<div class="table-box">
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>TITULO</th>
        <th>CIUDAD</th>
        <th>PRECIO</th>
      </tr>
    </thead>
    <tbody id="tabla"></tbody>
  </table>
</div>

<script>

const API = "/api/data";

// NAV
function mostrarModulo(modulo, btn){
  document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");

  if(modulo==="tareas") cargar("read_tareas");
  if(modulo==="propiedades") cargar("read_propiedades");
  if(modulo==="proyectos") cargar("read_proyectos");
  if(modulo==="clientes") cargar("read_clientes");
}

// FETCH
async function cargar(action){
  try{
    const res = await fetch(API + "?action=" + action);
    const json = await res.json();
    render(json.data);
  }catch(e){
    console.error(e);
  }
}

// RENDER
function render(data){

  const tabla = document.getElementById("tabla");
  tabla.innerHTML = "";

  if(!data || data.length === 0){
    tabla.innerHTML = "<tr><td colspan='4'>Sin datos</td></tr>";
    return;
  }

  data.forEach(p=>{
    tabla.innerHTML += `
      <tr>
        <td>${p.ID || "-"}</td>
        <td>${p.TITULO || "-"}</td>
        <td>${p.CIUDAD || "-"}</td>
        <td>$ ${p.PRECIO ? Number(p.PRECIO).toLocaleString() : "-"}</td>
      </tr>
    `;
  });
}

// INIT
cargar("read_tareas");

</script>

</body>
</html>
